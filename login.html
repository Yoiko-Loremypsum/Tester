<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Eksklusif - Dark Mode</title>
    <!-- Mengambil font elegan dari Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        /* Reset margin & padding */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Latar belakang Onyx Black dengan radial gradient halus */
        body {
            font-family: 'Montserrat', sans-serif;
            background: radial-gradient(circle at center, #16161a 0%, #0a0a0c 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
        }

        /* Kotak form dengan efek Obsidian Glassmorphism */
        .login-wrapper {
            background: rgba(20, 20, 25, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 50px 40px;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
        }

        /* Tipografi Judul (Pure Stark White) */
        .login-wrapper h2 {
            font-family: 'Cinzel', serif;
            font-size: 2rem;
            text-align: center;
            margin-bottom: 40px;
            color: #ffffff; 
            letter-spacing: 4px;
            font-weight: 500;
        }

        /* Input Form */
        .input-box {
            position: relative;
            margin-bottom: 36px;
        }

        .input-box input {
            width: 100%;
            padding: 10px 0;
            font-size: 1rem;
            color: #ffffff;
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
            outline: none;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Garis bawah menjadi putih tegas saat fokus */
        .input-box input:focus {
            border-bottom: 1px solid #ffffff; 
        }

        /* Label dengan animasi floating */
        .input-box label {
            position: absolute;
            top: 10px;
            left: 0;
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.4);
            pointer-events: none;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .input-box input:focus ~ label,
        .input-box input:valid ~ label {
            top: -18px;
            font-size: 0.8rem;
            color: #ffffff;
            font-weight: 500;
            letter-spacing: 1px;
        }

        /* Opsi Tambahan */
        .options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            margin-bottom: 40px;
        }

        .options label {
            display: flex;
            align-items: center;
            gap: 8px;
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            transition: 0.3s;
        }
        
        .options label:hover {
            color: rgba(255, 255, 255, 0.8);
        }
        
        /* Modifikasi Checkbox murni putih */
        .options input[type="checkbox"] {
            accent-color: #ffffff;
        }

        .options a {
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            transition: 0.3s;
        }

        .options a:hover {
            color: #ffffff;
            text-decoration: underline;
        }

        /* Tombol Premium Putih Solid (Stark Contrast) */
        .btn-login {
            width: 100%;
            padding: 15px;
            background: #ffffff;
            border: none;
            border-radius: 6px;
            color: #0a0a0c; /* Teks hitam pekat di atas tombol putih */
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 2px;
            font-family: 'Montserrat', sans-serif;
            text-transform: uppercase;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 20px rgba(255, 255, 255, 0.1);
        }

        .btn-login:hover {
            background: #e4e4e7; /* Platinum Gray redup saat hover */
            box-shadow: 0 8px 30px rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="login-wrapper">
        <h2>Login</h2>
        <form action="#">
            <div class="input-box">
                <input type="email" required>
                <label>Alamat Email</label>
            </div>
            
            <div class="input-box">
                <input type="password" required>
                <label>Kata sandi</label>
            </div>
            
            <div class="options">
                <label><input type="checkbox"> Ingat saya</label>
                <a href="#">Lupa sandi?</a>
            </div>
            
            <button type="submit" class="btn-login">Masuk</button>
        </form>
    </div>

</body>
</html>
